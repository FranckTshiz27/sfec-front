<div nz-row>
  <div nz-col nzFlex="1">
    <div class="ent-page">
      <div class="ent-hero-card">
        <div class="ent-hero-left">
          <div class="ent-hero-icon">
            <i nz-icon nzType="bank"></i>
          </div>
          <div class="ent-hero-texts">
            <h2>Entreprises</h2>
            <p>
              <span class="hero-dot"></span>
              {{ listOfData.length }} entreprise(s) affichée(s)
            </p>
          </div>
        </div>

        <button
          nz-button
          nzType="primary"
          nzSize="large"
          class="btn-new ent-btn-new"
          (click)="showUserModal()"
        >
          <i nz-icon nzType="plus"></i>
          Nouvelle entreprise
        </button>
      </div>

      <div class="ent-content-card">
        <div class="ent-search-row">
          <div class="ent-search-wrap">
            <nz-input-group [nzPrefix]="searchIconTpl">
              <input
                type="text"
                nz-input
                placeholder="Rechercher par code, nif ou nom..."
                [(ngModel)]="Filter"
                class="ent-search-input"
              />
            </nz-input-group>
          </div>

          <button
            nz-button
            nzType="default"
            class="ent-reset-btn"
            (click)="refreshData()"
            title="Actualiser"
          >
            <i nz-icon nzType="redo"></i>
          </button>
        </div>

        <nz-table
          [nzLoading]="loading"
          #filterTable
          class="ent-list-table"
          [nzData]="listOfData"
          nzTableLayout="fixed"
          [nzPageSize]="10"
          nzShowPagination
          nzShowSizeChanger
          [nzScroll]="{ x: '900px' }"
        >
          <thead>
            <tr>
              <th>Code</th>
              <th>NIF</th>
              <th>Nom</th>
              <th class="ent-actions-cell">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of filterTable.data">
              <td class="ent-code-cell">{{ data.code }}</td>
              <td>{{ data.nif }}</td>
              <td>{{ data.nom }}</td>
              <td class="ent-actions-cell">
                <div class="ent-actions-wrap">
                  <button
                    nz-button
                    nzType="default"
                    class="ent-action-btn"
                    (click)="showEditingModal(data)"
                    title="Modifier"
                  >
                    <span nz-icon nzTheme="outline" nzType="edit"></span>
                  </button>

                  <button
                    nz-button
                    nzType="default"
                    class="ent-action-btn ent-action-delete"
                    (click)="delete(data)"
                    title="Supprimer"
                  >
                    <span nz-icon nzTheme="outline" nzType="delete"></span>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </nz-table>
      </div>
    </div>
  </div>

  <ng-template #searchIconTpl>
    <i nz-icon nzType="search"></i>
  </ng-template>

  <nz-modal
    [(nzVisible)]="isUserAddingMoalVisible"
    [nzTitle]="!isEditing ? 'Nouvelle entreprise' : 'Modifier entreprise'"
    nzCancelText="Annuler"
    (nzOnCancel)="handleCancelUserModal()"
    nzWidth="40%"
    [nzFooter]="modalFooter"
  >
    <ng-container *nzModalContent>
      <div nz-col>
        <form
          nz-form
          [formGroup]="validateForm"
          nz-space
          nzAlign="start"
          class="space-align-block"
        >
          <nz-form-item nzJustify="center" style="margin-bottom: 5px">
            <nz-form-label
              [nzSpan]="24"
              nzFor="code"
              nzRequired
              style="margin-bottom: 5px"
              >Code</nz-form-label
            >
            <nz-form-control
              [nzSpan]="24"
              nzHasFeedback
              nzValidatingTip="Validation..."
              nzErrorTip="Svp entrez le code de l'entreprise"
            >
              <input
                nz-input
                formControlName="code"
                placeholder="Code entreprise"
                class="custom-input"
              />
            </nz-form-control>
          </nz-form-item>

          <nz-form-item nzJustify="center" style="margin-bottom: 5px">
            <nz-form-label
              [nzSpan]="24"
              nzFor="nif"
              nzRequired
              style="margin-bottom: 5px"
              >NIF</nz-form-label
            >
            <nz-form-control
              [nzSpan]="24"
              nzHasFeedback
              nzValidatingTip="Validation..."
              nzErrorTip="Svp entrez le nif de l'entreprise"
            >
              <input
                nz-input
                formControlName="nif"
                placeholder="NIF entreprise"
                class="custom-input"
              />
            </nz-form-control>
          </nz-form-item>

          <nz-form-item nzJustify="center" style="margin-bottom: 5px">
            <nz-form-label
              [nzSpan]="24"
              nzFor="nom"
              nzRequired
              style="margin-bottom: 5px"
              >Nom</nz-form-label
            >
            <nz-form-control
              [nzSpan]="24"
              nzHasFeedback
              nzValidatingTip="Validation..."
              nzErrorTip="Svp entrez le nom de l'entreprise"
            >
              <input
                nz-input
                formControlName="nom"
                placeholder="Nom entreprise"
                class="custom-input"
              />
            </nz-form-control>
          </nz-form-item>
        </form>
      </div>
    </ng-container>

    <ng-template #modalFooter>
      <div nz-row nzJustify="end" nzAlign="middle">
        <nz-form-item nz-row class="register-area p-button">
          <nz-form-control [nzSpan]="24" [nzOffset]="0">
            <button
              nz-button
              nzType="primary"
              (click)="saveOrUpdate()"
              type="button"
              [nzLoading]="isLoadingOne"
            >
              {{ !isEditing ? "Enregistrer" : "Modifier" }}
            </button>
            <button
              nz-button
              (click)="handleCancelUserModal()"
              style="margin-left: 10px"
            >
              Annuler
            </button>
          </nz-form-control>
        </nz-form-item>
      </div>
    </ng-template>
  </nz-modal>
</div>
